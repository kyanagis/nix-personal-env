name: CI

on:
  pull_request:
    branches:
      - main
      - feature/**
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Run flake checks
        run: nix flake check path:.

  home-manager-build:
    name: Home Manager (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - wsl
          - linux
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Build Home Manager activation package
        run: nix build ".#homeConfigurations.${{ matrix.profile }}.activationPackage"

  darwin-build:
    name: nix-darwin (mac)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Build nix-darwin system
        run: nix build --impure ".#darwinConfigurations.mac.system"

  repo-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Lint workflows, shell, and spelling
        run: |
          nix shell \
            nixpkgs#actionlint \
            nixpkgs#shellcheck \
            nixpkgs#typos \
            --command bash -euo pipefail -c '
              actionlint
              if compgen -G "bootstrap/*.sh" > /dev/null; then
                shellcheck bootstrap/*.sh
              fi
              typos .
            '
